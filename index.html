<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Indraam - Creative Studio</title>
    <meta name="description" content="Indraam is a US-based creative studio crafting ambitious digital experiences - websites, branding, and digital advertising." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      /* Critical inline CSS for instant loader render */
      .page-loader{position:fixed;inset:0;z-index:200;background:#050401;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .6s ease,visibility .6s ease}
      .page-loader.loaded{opacity:0;visibility:hidden;pointer-events:none}
      .loader-spinner{width:32px;height:32px;border:2px solid rgba(242,204,143,.15);border-top-color:#F2CC8F;border-radius:50%;animation:loader-spin .8s linear infinite}
      .loader-text{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:rgba(242,204,143,.4)}
      @keyframes loader-spin{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <!-- Instant page loader - renders before JS bundle loads -->
    <div id="page-loader" class="page-loader">
      <div class="loader-spinner"></div>
      <span class="loader-text">Loading</span>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
